<?xml version="1.0" encoding="UTF-8"?>
<!-- entsoeapi hex sticker — Version 2: "Grid" (dark navy + cyan power grid network) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 231" width="400" height="462">
  <defs>
    <clipPath id="clip2">
      <polygon points="100,3 198,59 198,172 100,229 2,172 2,59"/>
    </clipPath>
    <radialGradient id="bg2" cx="50%" cy="45%" r="65%">
      <stop offset="0%"   stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#050d18"/>
    </radialGradient>
    <filter id="nodeglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="edgeglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer border -->
  <polygon points="100,3 198,59 198,172 100,229 2,172 2,59"
           fill="#29B6F6"/>

  <!-- Inner background -->
  <polygon points="100,11 190,62 190,169 100,220 10,169 10,62"
           fill="url(#bg2)"/>

  <!-- Power grid edges (clipped) -->
  <g clip-path="url(#clip2)" stroke="#1a6896" stroke-width="1.1" fill="none"
     filter="url(#edgeglow)">
    <!-- Spoke: hub → inner ring -->
    <line x1="100" y1="115" x2="100"  y2="73"/>
    <line x1="100" y1="115" x2="136"  y2="94"/>
    <line x1="100" y1="115" x2="136"  y2="136"/>
    <line x1="100" y1="115" x2="100"  y2="157"/>
    <line x1="100" y1="115" x2="64"   y2="136"/>
    <line x1="100" y1="115" x2="64"   y2="94"/>
    <!-- Inner ring edges -->
    <line x1="100"  y1="73"  x2="136"  y2="94"/>
    <line x1="136"  y1="94"  x2="136"  y2="136"/>
    <line x1="136"  y1="136" x2="100"  y2="157"/>
    <line x1="100"  y1="157" x2="64"   y2="136"/>
    <line x1="64"   y1="136" x2="64"   y2="94"/>
    <line x1="64"   y1="94"  x2="100"  y2="73"/>
    <!-- Outer spurs -->
    <line x1="100"  y1="73"  x2="78"   y2="56"/>
    <line x1="100"  y1="73"  x2="122"  y2="56"/>
    <line x1="136"  y1="94"  x2="158"  y2="88"/>
    <line x1="136"  y1="136" x2="158"  y2="142"/>
    <line x1="100"  y1="157" x2="100"  y2="178"/>
    <line x1="64"   y1="136" x2="42"   y2="142"/>
    <line x1="64"   y1="94"  x2="42"   y2="88"/>
    <!-- Cross-connections for density -->
    <line x1="78"   y1="56"  x2="122"  y2="56"/>
    <line x1="158"  y1="88"  x2="158"  y2="142"/>
    <line x1="42"   y1="88"  x2="42"   y2="142"/>
  </g>

  <!-- Nodes (clipped + glowing) -->
  <g clip-path="url(#clip2)" filter="url(#nodeglow)">
    <!-- Central hub -->
    <circle cx="100" cy="115" r="5.5" fill="#29B6F6"/>
    <!-- Inner ring -->
    <circle cx="100"  cy="73"  r="3.5" fill="#29B6F6"/>
    <circle cx="136"  cy="94"  r="3.5" fill="#29B6F6"/>
    <circle cx="136"  cy="136" r="3.5" fill="#29B6F6"/>
    <circle cx="100"  cy="157" r="3.5" fill="#29B6F6"/>
    <circle cx="64"   cy="136" r="3.5" fill="#29B6F6"/>
    <circle cx="64"   cy="94"  r="3.5" fill="#29B6F6"/>
    <!-- Outer terminals -->
    <circle cx="78"   cy="56"  r="2.5" fill="#29B6F6" opacity="0.75"/>
    <circle cx="122"  cy="56"  r="2.5" fill="#29B6F6" opacity="0.75"/>
    <circle cx="158"  cy="88"  r="2.5" fill="#29B6F6" opacity="0.75"/>
    <circle cx="158"  cy="142" r="2.5" fill="#29B6F6" opacity="0.75"/>
    <circle cx="100"  cy="178" r="2.5" fill="#29B6F6" opacity="0.75"/>
    <circle cx="42"   cy="142" r="2.5" fill="#29B6F6" opacity="0.75"/>
    <circle cx="42"   cy="88"  r="2.5" fill="#29B6F6" opacity="0.75"/>
  </g>

  <!-- Package name — top -->
  <text x="100" y="44"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="bold" font-size="17" letter-spacing="0.8"
        fill="#ffffff">entsoeapi</text>

  <!-- Bottom label -->
  <text x="100" y="194"
        text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="8" letter-spacing="2.5"
        fill="#5bb8e8">ENTSO-E</text>
</svg>
