<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="400" height="462"><svg viewBox="0 0 200 231" width="400" height="462">
  <defs>
    <clipPath id="clip2">
      <polygon points="100,3 198,59 198,172 100,229 2,172 2,59"></polygon>
    </clipPath>
    <radialGradient id="bg2" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0d2137"></stop>
      <stop offset="100%" stop-color="#050d18"></stop>
    </radialGradient>
    <filter id="nodeglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
    <filter id="edgeglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer border -->
  <polygon points="100,3 198,59 198,172 100,229 2,172 2,59" fill="#29B6F6"></polygon>

  <!-- Inner background -->
  <polygon points="100,11 190,62 190,169 100,220 10,169 10,62" fill="url(#bg2)"></polygon>

  <!-- Power grid edges (clipped) -->
  <g clip-path="url(#clip2)" stroke="#1a6896" stroke-width="1.1" fill="none" filter="url(#edgeglow)">
    <!-- Spoke: hub → inner ring -->
    <line x1="100" y1="115" x2="100" y2="73"></line>
    <line x1="100" y1="115" x2="136" y2="94"></line>
    <line x1="100" y1="115" x2="136" y2="136"></line>
    <line x1="100" y1="115" x2="100" y2="157"></line>
    <line x1="100" y1="115" x2="64" y2="136"></line>
    <line x1="100" y1="115" x2="64" y2="94"></line>
    <!-- Inner ring edges -->
    <line x1="100" y1="73" x2="136" y2="94"></line>
    <line x1="136" y1="94" x2="136" y2="136"></line>
    <line x1="136" y1="136" x2="100" y2="157"></line>
    <line x1="100" y1="157" x2="64" y2="136"></line>
    <line x1="64" y1="136" x2="64" y2="94"></line>
    <line x1="64" y1="94" x2="100" y2="73"></line>
    <!-- Outer spurs -->
    <line x1="100" y1="73" x2="78" y2="56"></line>
    <line x1="100" y1="73" x2="122" y2="56"></line>
    <line x1="136" y1="94" x2="158" y2="88"></line>
    <line x1="136" y1="136" x2="158" y2="142"></line>
    <line x1="100" y1="157" x2="100" y2="178"></line>
    <line x1="64" y1="136" x2="42" y2="142"></line>
    <line x1="64" y1="94" x2="42" y2="88"></line>
    <!-- Cross-connections for density -->
    <line x1="78" y1="56" x2="122" y2="56"></line>
    <line x1="158" y1="88" x2="158" y2="142"></line>
    <line x1="42" y1="88" x2="42" y2="142"></line>
  </g>

  <!-- Nodes (clipped + glowing) -->
  <g clip-path="url(#clip2)" filter="url(#nodeglow)">
    <!-- Central hub -->
    <circle cx="100" cy="115" r="5.5" fill="#29B6F6"></circle>
    <!-- Inner ring -->
    <circle cx="100" cy="73" r="3.5" fill="#29B6F6"></circle>
    <circle cx="136" cy="94" r="3.5" fill="#29B6F6"></circle>
    <circle cx="136" cy="136" r="3.5" fill="#29B6F6"></circle>
    <circle cx="100" cy="157" r="3.5" fill="#29B6F6"></circle>
    <circle cx="64" cy="136" r="3.5" fill="#29B6F6"></circle>
    <circle cx="64" cy="94" r="3.5" fill="#29B6F6"></circle>
    <!-- Outer terminals -->
    <circle cx="78" cy="56" r="2.5" fill="#29B6F6" opacity="0.75"></circle>
    <circle cx="122" cy="56" r="2.5" fill="#29B6F6" opacity="0.75"></circle>
    <circle cx="158" cy="88" r="2.5" fill="#29B6F6" opacity="0.75"></circle>
    <circle cx="158" cy="142" r="2.5" fill="#29B6F6" opacity="0.75"></circle>
    <circle cx="100" cy="178" r="2.5" fill="#29B6F6" opacity="0.75"></circle>
    <circle cx="42" cy="142" r="2.5" fill="#29B6F6" opacity="0.75"></circle>
    <circle cx="42" cy="88" r="2.5" fill="#29B6F6" opacity="0.75"></circle>
  </g>

  <!-- Package name — top -->
  <text x="100" y="44" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="bold" font-size="17" letter-spacing="0.8" fill="#ffffff">entsoeapi</text>

  <!-- Bottom label -->
  <text x="100" y="194" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" letter-spacing="2.5" fill="#5bb8e8">ENTSO-E</text>
</svg></svg>